{{define "admin/category_form.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">后台管理</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link active" href="/admin/categories">分类管理</a>
        <a class="nav-link" href="/admin/posts">文章管理</a>
        <a class="nav-link" href="/admin/uploads">图片管理</a>
        <a class="nav-link" href="/admin/messages">留言审核</a>
        <a class="nav-link" href="/admin/settings">站点设置</a>
        <a class="nav-link" href="/admin/password">修改密码</a>
        <a class="nav-link" href="/admin/logout">退出</a>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">{{.PageTitle}}</h1>
      <a class="btn btn-outline-dark" href="/admin/categories">返回分类列表</a>
    </div>
    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}
    <form method="post" class="vstack gap-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">分类名称</label>
              <input class="form-control" name="name" value="{{.Category.Name}}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Slug</label>
              <input class="form-control" name="slug" value="{{.Category.Slug}}">
            </div>
            <div class="col-md-4">
              <label class="form-label">父分类</label>
              <select class="form-select" name="parent_id">
                <option value="0">无</option>
                {{range .Categories}}
                <option value="{{.ID}}" {{if eq $.Category.ParentID .ID}}selected{{end}}>{{.Name}}</option>
                {{end}}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">排序</label>
              <input class="form-control" name="sort" value="{{.Category.Sort}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">SEO 标题</label>
              <input class="form-control" name="seo_title" value="{{.Category.SEOTitle}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">SEO 关键词</label>
              <input class="form-control" name="seo_keywords" value="{{.Category.SEOKeywords}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">SEO 描述</label>
              <textarea class="form-control" rows="3" name="seo_description">{{.Category.SEODescription}}</textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-danger" type="submit">保存分类</button>
        <a class="btn btn-outline-dark" href="/admin/categories">取消</a>
      </div>
    </form>
  </div>
</body>
</html>
{{end}}
