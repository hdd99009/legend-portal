{{define "admin/password.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">后台管理</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/admin/posts">文章管理</a>
        <a class="nav-link" href="/admin/messages">留言审核</a>
        <a class="nav-link" href="/admin/settings">站点设置</a>
        <a class="nav-link active" href="/admin/password">修改密码</a>
        <a class="nav-link" href="/admin/logout">退出</a>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h1 class="h4 mb-0">修改密码</h1>
          <a class="btn btn-outline-dark" href="/admin">返回后台</a>
        </div>
        {{if .Error}}
        <div class="alert alert-danger">{{.Error}}</div>
        {{end}}
        {{if .Success}}
        <div class="alert alert-success">{{.Success}}</div>
        {{end}}
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <form method="post" action="/admin/password" class="vstack gap-3">
              <div>
                <label class="form-label">旧密码</label>
                <input class="form-control" type="password" name="old_password" required>
              </div>
              <div>
                <label class="form-label">新密码</label>
                <input class="form-control" type="password" name="new_password" minlength="6" required>
              </div>
              <div>
                <label class="form-label">确认新密码</label>
                <input class="form-control" type="password" name="confirm_password" minlength="6" required>
              </div>
              <button class="btn btn-danger" type="submit">保存新密码</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
