{{define "admin/messages_list.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">后台管理</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/admin/categories">分类管理</a>
        <a class="nav-link" href="/admin/posts">文章管理</a>
        <a class="nav-link" href="/admin/uploads">图片管理</a>
        <a class="nav-link active" href="/admin/messages">留言审核</a>
        <a class="nav-link" href="/admin/settings">站点设置</a>
        <a class="nav-link" href="/admin/password">修改密码</a>
        <a class="nav-link" href="/admin/logout">退出</a>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h1 class="h4 mb-1">留言审核</h1>
        <div class="text-secondary small">可以批准展示，也可以隐藏不展示，支持填写后台回复。</div>
      </div>
      <a class="btn btn-outline-dark" href="/admin">返回后台</a>
    </div>
    <div class="vstack gap-3">
      {{range .Messages}}
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
            <div>
              <div class="fw-semibold">{{.Nickname}}</div>
              <div class="small text-secondary">联系方式：{{.Contact}} | IP：{{.IP}} | 提交时间：{{.CreatedAt}}</div>
            </div>
            <span class="badge text-bg-secondary">{{.Status}}</span>
          </div>
          <div class="mb-3">{{.Content}}</div>
          <div class="row g-3">
            <div class="col-lg-6">
              <form method="post" action="/admin/messages/{{.ID}}/approve" class="vstack gap-2">
                <label class="form-label mb-0">审核通过时的后台回复</label>
                <textarea class="form-control" rows="3" name="reply_content">{{.ReplyContent}}</textarea>
                <button class="btn btn-success" type="submit">审核通过</button>
              </form>
            </div>
            <div class="col-lg-6">
              <form method="post" action="/admin/messages/{{.ID}}/hide" class="vstack gap-2">
                <label class="form-label mb-0">隐藏时备注</label>
                <textarea class="form-control" rows="3" name="reply_content">{{.ReplyContent}}</textarea>
                <button class="btn btn-outline-danger" type="submit">隐藏留言</button>
              </form>
            </div>
          </div>
        </div>
      </div>
      {{else}}
      <div class="alert alert-secondary mb-0">目前没有留言记录。</div>
      {{end}}
    </div>
  </div>
</body>
</html>
{{end}}
