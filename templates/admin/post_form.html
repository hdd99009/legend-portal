{{define "admin/post_form.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">后台管理</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/admin/posts">文章管理</a>
        <a class="nav-link" href="/admin/messages">留言审核</a>
        <a class="nav-link" href="/admin/settings">站点设置</a>
        <a class="nav-link" href="/admin/password">修改密码</a>
        <a class="nav-link" href="/admin/logout">退出</a>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">{{.PageTitle}}</h1>
      <a class="btn btn-outline-dark" href="/admin/posts">返回列表</a>
    </div>
    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}
    <form method="post" class="vstack gap-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h6 mb-0">内容编辑</h2>
            <div class="small text-secondary">支持先上传图片，再把返回的地址粘贴进正文。</div>
          </div>
          <div class="border rounded-3 p-3 mb-4 bg-light-subtle">
            <div class="row g-3 align-items-end">
              <div class="col-md-6">
                <label class="form-label">上传文章图片</label>
                <input class="form-control" type="file" id="articleImage" accept=".jpg,.jpeg,.png,.gif,.webp,image/*">
              </div>
              <div class="col-md-3">
                <button class="btn btn-outline-dark w-100" type="button" id="uploadImageBtn">上传图片</button>
              </div>
              <div class="col-md-3">
                <button class="btn btn-outline-secondary w-100" type="button" id="copyImageUrlBtn">复制图片地址</button>
              </div>
            </div>
            <div class="small text-secondary mt-2">图片保存在本地服务器 `storage/uploads`，已加基础 Referer 防盗链。</div>
            <div class="mt-3 d-none" id="uploadImageResultWrap">
              <label class="form-label">上传结果</label>
              <input class="form-control" id="uploadImageResult" readonly>
            </div>
            <div class="mt-3 d-none" id="uploadImagePreviewWrap">
              <div class="small text-secondary mb-2">图片预览</div>
              <img id="uploadImagePreview" class="img-fluid rounded border" alt="上传预览">
            </div>
            <div class="mt-3 d-none" id="uploadImageErrorWrap">
              <div class="alert alert-danger mb-0" id="uploadImageError"></div>
            </div>
          </div>
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">标题</label>
              <input class="form-control" name="title" value="{{.Post.Title}}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Slug</label>
              <input class="form-control" name="slug" value="{{.Post.Slug}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">副标题</label>
              <input class="form-control" name="subtitle" value="{{.Post.Subtitle}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">摘要</label>
              <textarea class="form-control" rows="3" name="summary">{{.Post.Summary}}</textarea>
            </div>
            <div class="col-md-12">
              <label class="form-label">HTML 正文</label>
              <textarea class="form-control" rows="12" name="content" required>{{.Post.Content}}</textarea>
            </div>
            <div class="col-md-12">
              <label class="form-label">Markdown 正文</label>
              <textarea class="form-control" rows="8" name="content_markdown">{{.Post.ContentMarkdown}}</textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h2 class="h6 mb-3">业务信息</h2>
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">分类 ID</label>
              <input class="form-control" name="category_id" value="{{.Post.CategoryID}}">
            </div>
            <div class="col-md-3">
              <label class="form-label">类型</label>
              <input class="form-control" name="type" value="{{.Post.Type}}">
            </div>
            <div class="col-md-3">
              <label class="form-label">状态</label>
              <select class="form-select" name="status">
                <option value="draft" {{if eq .Post.Status "draft"}}selected{{end}}>draft</option>
                <option value="published" {{if eq .Post.Status "published"}}selected{{end}}>published</option>
                <option value="offline" {{if eq .Post.Status "offline"}}selected{{end}}>offline</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">版本</label>
              <input class="form-control" name="game_version" value="{{.Post.GameVersion}}">
            </div>
            <div class="col-md-3">
              <label class="form-label">线路</label>
              <input class="form-control" name="server_line" value="{{.Post.ServerLine}}">
            </div>
            <div class="col-md-3">
              <label class="form-label">类型标签</label>
              <input class="form-control" name="game_genre" value="{{.Post.GameGenre}}">
            </div>
            <div class="col-md-3">
              <label class="form-label">地区</label>
              <input class="form-control" name="region" value="{{.Post.Region}}">
            </div>
            <div class="col-md-3">
              <label class="form-label">QQ群</label>
              <input class="form-control" name="qq_group" value="{{.Post.QQGroup}}">
            </div>
            <div class="col-md-6">
              <label class="form-label">官网链接</label>
              <input class="form-control" name="official_url" value="{{.Post.OfficialURL}}">
            </div>
            <div class="col-md-6">
              <label class="form-label">下载链接</label>
              <input class="form-control" name="download_url" value="{{.Post.DownloadURL}}">
            </div>
            <div class="col-md-3">
              <div class="form-check mt-4 pt-2">
                <input class="form-check-input" type="checkbox" value="1" name="is_top" id="is_top" {{if eq .Post.IsTop 1}}checked{{end}}>
                <label class="form-check-label" for="is_top">置顶</label>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-check mt-4 pt-2">
                <input class="form-check-input" type="checkbox" value="1" name="is_recommend" id="is_recommend" {{if eq .Post.IsRecommend 1}}checked{{end}}>
                <label class="form-check-label" for="is_recommend">推荐</label>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h2 class="h6 mb-3">SEO</h2>
          <div class="row g-3">
            <div class="col-md-12">
              <label class="form-label">SEO 标题</label>
              <input class="form-control" name="seo_title" value="{{.Post.SEOTitle}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">SEO 关键词</label>
              <input class="form-control" name="seo_keywords" value="{{.Post.SEOKeywords}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">SEO 描述</label>
              <textarea class="form-control" rows="3" name="seo_description">{{.Post.SEODescription}}</textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-danger" type="submit">保存文章</button>
        <a class="btn btn-outline-dark" href="/admin/posts">取消</a>
      </div>
    </form>
  </div>
  <script>
    const uploadBtn = document.getElementById('uploadImageBtn');
    const copyBtn = document.getElementById('copyImageUrlBtn');
    const fileInput = document.getElementById('articleImage');
    const resultWrap = document.getElementById('uploadImageResultWrap');
    const resultInput = document.getElementById('uploadImageResult');
    const previewWrap = document.getElementById('uploadImagePreviewWrap');
    const previewImg = document.getElementById('uploadImagePreview');
    const errorWrap = document.getElementById('uploadImageErrorWrap');
    const errorBox = document.getElementById('uploadImageError');

    async function uploadImage() {
      if (!fileInput.files || fileInput.files.length === 0) {
        errorWrap.classList.remove('d-none');
        errorBox.textContent = '请先选择图片文件';
        return;
      }

      errorWrap.classList.add('d-none');
      const formData = new FormData();
      formData.append('image', fileInput.files[0]);
      uploadBtn.disabled = true;
      uploadBtn.textContent = '上传中...';

      try {
        const response = await fetch('/admin/upload/image', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || '上传失败');
        }

        resultWrap.classList.remove('d-none');
        resultInput.value = data.url;
        previewWrap.classList.remove('d-none');
        previewImg.src = data.url;
      } catch (error) {
        errorWrap.classList.remove('d-none');
        errorBox.textContent = error.message || '上传失败';
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = '上传图片';
      }
    }

    uploadBtn?.addEventListener('click', uploadImage);
    copyBtn?.addEventListener('click', async () => {
      if (!resultInput.value) {
        errorWrap.classList.remove('d-none');
        errorBox.textContent = '还没有可复制的图片地址';
        return;
      }
      await navigator.clipboard.writeText(resultInput.value);
      errorWrap.classList.add('d-none');
    });
  </script>
</body>
</html>
{{end}}
