{{define "admin/categories_list.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">后台管理</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link active" href="/admin/categories">分类管理</a>
        <a class="nav-link" href="/admin/posts">文章管理</a>
        <a class="nav-link" href="/admin/uploads">图片管理</a>
        <a class="nav-link" href="/admin/messages">留言审核</a>
        <a class="nav-link" href="/admin/settings">站点设置</a>
        <a class="nav-link" href="/admin/password">修改密码</a>
        <a class="nav-link" href="/admin/logout">退出</a>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h1 class="h4 mb-1">分类管理</h1>
        <div class="text-secondary small">先做轻量分类管理，文章发布时就可以下拉选择。</div>
      </div>
      <a class="btn btn-danger" href="/admin/categories/new">新增分类</a>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>名称</th>
              <th>Slug</th>
              <th>排序</th>
              <th class="text-end">操作</th>
            </tr>
          </thead>
          <tbody>
            {{range .Categories}}
            <tr>
              <td>{{.ID}}</td>
              <td>{{.Name}}</td>
              <td><code>{{.Slug}}</code></td>
              <td>{{.Sort}}</td>
              <td class="text-end">
                <a class="btn btn-sm btn-dark" href="/admin/categories/{{.ID}}/edit">编辑</a>
              </td>
            </tr>
            {{else}}
            <tr>
              <td colspan="5" class="text-center text-secondary py-4">暂时还没有分类。</td>
            </tr>
            {{end}}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
