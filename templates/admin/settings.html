{{define "admin/settings.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">后台管理</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/admin/posts">文章管理</a>
        <a class="nav-link" href="/admin/messages">留言审核</a>
        <a class="nav-link active" href="/admin/settings">站点设置</a>
        <a class="nav-link" href="/admin/password">修改密码</a>
        <a class="nav-link" href="/admin/logout">退出</a>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h1 class="h4 mb-1">站点设置与 SEO</h1>
        <div class="text-secondary small">这里控制首页标题、关键词、描述、站点名、页脚和联系方式。</div>
      </div>
      <a class="btn btn-outline-dark" href="/admin">返回后台</a>
    </div>
    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}
    {{if .Success}}
    <div class="alert alert-success">{{.Success}}</div>
    {{end}}
    <form method="post" action="/admin/settings" class="vstack gap-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h2 class="h6 mb-3">基础信息</h2>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">站点名称</label>
              <input class="form-control" name="site_name" value="{{.Settings.SiteName}}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">首页标题</label>
              <input class="form-control" name="site_title" value="{{.Settings.SiteTitle}}" required>
            </div>
            <div class="col-md-12">
              <label class="form-label">页脚文字</label>
              <input class="form-control" name="footer_text" value="{{.Settings.FooterText}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">联系方式</label>
              <input class="form-control" name="contact_info" value="{{.Settings.ContactInfo}}">
            </div>
          </div>
        </div>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h2 class="h6 mb-3">SEO 配置</h2>
          <div class="row g-3">
            <div class="col-md-12">
              <label class="form-label">首页关键词</label>
              <input class="form-control" name="site_keywords" value="{{.Settings.SiteKeywords}}">
            </div>
            <div class="col-md-12">
              <label class="form-label">首页描述</label>
              <textarea class="form-control" rows="4" name="site_description">{{.Settings.SiteDescription}}</textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-danger" type="submit">保存设置</button>
        <a class="btn btn-outline-dark" href="/admin">取消</a>
      </div>
    </form>
  </div>
</body>
</html>
{{end}}
