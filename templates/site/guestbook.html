{{define "site/guestbook.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.PageTitle}}</title>
  <meta name="keywords" content="{{.SiteKeywords}}">
  <meta name="description" content="{{.SiteDescription}}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/site.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary-subtle">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">{{.SiteTitle}}</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/">首页</a>
        <a class="nav-link active" href="/guestbook">玩家留言</a>
      </div>
    </div>
  </nav>
  <main class="py-4">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-3">玩家留言板</h1>
              <p class="text-secondary small">留言先进入审核，适合控制垃圾内容和刷屏。</p>
              {{if .Notice}}
              <div class="alert alert-info">{{.Notice}}</div>
              {{end}}
              <form method="post" action="/guestbook" class="vstack gap-3">
                <div>
                  <label class="form-label">昵称</label>
                  <input class="form-control" name="nickname" maxlength="30" required>
                </div>
                <div>
                  <label class="form-label">联系方式</label>
                  <input class="form-control" name="contact" maxlength="50">
                </div>
                <div>
                  <label class="form-label">留言内容</label>
                  <textarea class="form-control" name="content" rows="5" maxlength="500" required></textarea>
                </div>
                <button class="btn btn-danger" type="submit">提交留言</button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h5 mb-0">最新通过留言</h2>
                <span class="text-muted small">前台只显示审核通过内容</span>
              </div>
              <div class="vstack gap-3">
                {{range .Messages}}
                <article class="border rounded-3 p-3">
                  <div class="d-flex justify-content-between mb-2">
                    <strong>{{.Nickname}}</strong>
                    <span class="small text-muted">{{.CreatedAt}}</span>
                  </div>
                  <div class="text-secondary">{{.Content}}</div>
                </article>
                {{else}}
                <div class="alert alert-secondary mb-0">暂时还没有通过审核的留言。</div>
                {{end}}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
