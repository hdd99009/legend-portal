name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o legend-portal ./cmd/web

      - name: Upload binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: legend-portal
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            export SHARED_PATH="/srv/legend-portal/shared"
            export APP_CONFIG_PATH="/srv/legend-portal/shared/config.production.yaml"
            export SERVICE_NAME="legend-portal"
            export BIN_SOURCE="${{ secrets.DEPLOY_PATH }}/legend-portal"
            cd "${DEPLOY_PATH}"
            bash deploy/deploy.sh
